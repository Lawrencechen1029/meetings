<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议室预定系统</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 5px;
            text-align: center;
            border: 1px solid #ddd;
            position: relative;
        }
        th {
            background-color: #f2f2f2;
        }
        button {
            padding: 5px 10px;
            cursor: pointer;
        }
        .tooltip {
            visibility: hidden;
            background-color: black;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px;
            position: absolute;
            z-index: 1;
            bottom: 125%; /* Position the tooltip above the text */
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .tooltip::after {
            content: '';
            position: absolute;
            top: 100%; /* Arrow at the bottom of the tooltip */
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: black transparent transparent transparent;
        }
        td:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>会议室预定系统</h1>
    <table id="bookingTable">
        <thead>
        <tr>
            <th></th>
            <!-- Days will be dynamically inserted here -->
        </tr>
        </thead>
        <tbody>
        <!-- Time slots and bookings will be dynamically inserted here -->
        </tbody>
    </table>

    <form id="bookingForm">
        <label for="date">日期:</label>
        <input type="date" id="date" name="date" required><br><br>
        
        <label for="time">时间:</label>
        <select id="time" name="time" required>
            <!-- Time options will be dynamically generated here -->
        </select><br><br>
        
        <label for="room">会议室:</label>
        <select id="room" name="room" required>
            <option value="1401">1401会议室</option>
            <option value="1402">1402会议室</option>
        </select><br><br>
        
        <label for="username">用户名:</label>
        <input type="text" id="username" name="username" required><br><br>
        
        <button type="submit">预定</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
        const bookingTableHead = document.getElementById('bookingTable').getElementsByTagName('thead')[0];
        const bookingTableBody = document.getElementById('bookingTable').getElementsByTagName('tbody')[0];
        const timeSelect = document.getElementById('time');
        const bookingForm = document.getElementById('bookingForm');

        // 初始化时间选择器
        initializeTimeSelector();

        // 初始化表格头
        initializeTableHeader();

        // 渲染表格体
        renderTableBody(bookings);

        // 表单提交事件
        bookingForm.addEventListener('submit', function(event) {
            event.preventDefault();
            addBooking();
        });

        function initializeTimeSelector() {
            const startTime = new Date(2023, 0, 1, 9, 0); // 9:00 AM
            const endTime = new Date(2023, 0, 1, 17, 0); // 5:00 PM

            while (startTime <= endTime) {
                const option = document.createElement('option');
                option.value = startTime.toISOString().substring(11, 16);
                option.text = startTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                timeSelect.appendChild(option);
                startTime.setMinutes(startTime.getMinutes() + 30);
            }
        }

        function initializeTableHeader() {
            const headerRow = bookingTableHead.getElementsByTagName('tr')[0];
            const daysOfWeek = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
            const currentWeekStart = getMondayOfCurrentWeek();

            daysOfWeek.forEach((day, index) => {
                const th = document.createElement('th');
                const date = new Date(currentWeekStart);
                date.setDate(currentWeekStart.getDate() + index);
                th.textContent = `${day} ${formatDate(date)}`;
                headerRow.appendChild(th);
            });
        }

        function renderTableBody(bookings) {
            bookingTableBody.innerHTML = '';

            for (let hour = 0; hour < 24; hour++) {
                for (let minute = 0; minute < 60; minute += 30) {
                    const tr = document.createElement('tr');
                    const timeCell = document.createElement('td');
                    timeCell.textContent = `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
                    tr.appendChild(timeCell);

                    for (let day = 0; day < 7; day++) {
                        const td = document.createElement('td');
                        const currentWeekStart = getMondayOfCurrentWeek();
                        const currentDate = new Date(currentWeekStart);
                        currentDate.setDate(currentWeekStart.getDate() + day);
                        currentDate.setHours(hour, minute, 0, 0);

                        const bookingsForTimeSlot = bookings.filter(booking => {
                            const bookingDate = new Date(`${booking.date}T${booking.time}:00`);
                            return isSameDayAndTime(bookingDate, currentDate);
                        });

                        if (bookingsForTimeSlot.length > 0) {
                            const tooltip = document.createElement('div');
                            tooltip.className = 'tooltip';
                            bookingsForTimeSlot.forEach(booking => {
                                tooltip.innerHTML += `<p>${booking.room} - ${booking.username}</p>`;
                            });
                            td.appendChild(tooltip);
                        }

                        tr.appendChild(td);
                    }

                    bookingTableBody.appendChild(tr);
                }
            }
        }

        function addBooking() {
            const dateInput = document.getElementById('date').value;
            const timeInput = document.getElementById('time').value;
            const roomInput = document.getElementById('room').value;
            const usernameInput = document.getElementById('username').value;

            const newBooking = {
                date: dateInput,
                time: timeInput,
                room: roomInput,
                username: usernameInput
            };

            bookings.push(newBooking);
            localStorage.setItem('bookings', JSON.stringify(bookings));
            renderTableBody(bookings);
            bookingForm.reset();
        }

        function formatDate(date) {
            return `${date.getMonth() + 1}/${date.getDate()}`;
        }

        function getMondayOfCurrentWeek() {
            const today = new Date();
            const dayOfWeek = today.getDay();
            const diff = today.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1); // adjust when day is sunday
            return new Date(today.setDate(diff));
        }

        function isSameDayAndTime(date1, date2) {
            return (
                date1.getFullYear() === date2.getFullYear() &&
                date1.getMonth() === date2.getMonth() &&
                date1.getDate() === date2.getDate() &&
                date1.getHours() === date2.getHours() &&
                date1.getMinutes() === date2.getMinutes()
            );
        }
    });
</script>
</body>
</html>
